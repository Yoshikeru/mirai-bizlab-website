<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A flow of documents from quote to invoice to payment under a cloud">
  <defs>
    <linearGradient id="faPaper" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="faGlow" cx="50%" cy="28%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.13"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#faPaper)"/><rect width="1200" height="675" fill="url(#faGlow)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="1130" cy="580" r="220" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- cloud above center -->
  <g transform="translate(600 150)" fill="none" stroke="#1f1d1b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.45">
    <path d="M-104 38 a38 38 0 0 1 15 -74 a55 55 0 0 1 106 -9 a42 42 0 0 1 27 83 Z"/>
  </g>
  <!-- sync dots cloud -> flow -->
  <g fill="#1f1d1b" fill-opacity="0.22"><circle cx="600" cy="232" r="4"/><circle cx="600" cy="262" r="4"/></g>

  <!-- flow of 3 document nodes -->
  <g>
    <!-- node 1: quote -->
    <g transform="translate(300 318)"><rect x="-58" y="-58" width="116" height="116" rx="22" fill="#ffffff" fill-opacity="0.55" stroke="#1f1d1b" stroke-width="2.5"/>
      <g stroke="#1f1d1b" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"><line x1="-26" y1="-22" x2="26" y2="-22"/><line x1="-26" y1="0" x2="26" y2="0"/><line x1="-26" y1="22" x2="6" y2="22"/></g></g>
    <!-- node 2: invoice -->
    <g transform="translate(600 376)"><rect x="-58" y="-58" width="116" height="116" rx="22" fill="#ffffff" fill-opacity="0.55" stroke="#1f1d1b" stroke-width="2.5"/>
      <g stroke="#1f1d1b" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"><line x1="-26" y1="-22" x2="26" y2="-22"/><line x1="-26" y1="0" x2="26" y2="0"/><line x1="-26" y1="22" x2="6" y2="22"/></g></g>
    <!-- node 3: payment (accent) -->
    <g transform="translate(900 318)"><rect x="-58" y="-58" width="116" height="116" rx="22" fill="#d7000f" fill-opacity="0.1" stroke="#d7000f" stroke-width="2.5"/>
      <path d="M-16 4 L-4 16 L20 -14" fill="none" stroke="#d7000f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></g>
  </g>
  <!-- flow arrows -->
  <g stroke="#d7000f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="372" y1="344" x2="528" y2="374"/>
    <polygon points="528,374 506,368 512,388" fill="#d7000f" stroke="none"/>
    <line x1="672" y1="374" x2="828" y2="344"/>
    <polygon points="828,344 808,338 814,358" fill="#d7000f" stroke="none"/>
  </g>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — JOURNAL</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">CLOUD · FLOW</text>
</svg>
