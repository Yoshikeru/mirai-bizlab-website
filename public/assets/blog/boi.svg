<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="An approval seal with rays, representing BOI investment incentives">
  <defs>
    <linearGradient id="boiPaper" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="boiGlow" cx="50%" cy="40%" r="60%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.13"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#boiPaper)"/><rect width="1200" height="675" fill="url(#boiGlow)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="1120" cy="560" r="230" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- approval seal -->
  <g transform="translate(600 338)">
    <!-- tick / ray ring -->
    <circle r="178" fill="none" stroke="#1f1d1b" stroke-opacity="0.22" stroke-width="16" stroke-dasharray="2 26"/>
    <circle r="150" fill="#ffffff" fill-opacity="0.5" stroke="#1f1d1b" stroke-width="2"/>
    <circle r="116" fill="none" stroke="#d7000f" stroke-width="2.5"/>
    <!-- check -->
    <path d="M-46 6 L-14 40 L52 -38" fill="none" stroke="#d7000f" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ascending incentive bars (lower right) -->
  <g fill="none" stroke="#1f1d1b" stroke-opacity="0.4" stroke-width="3">
    <line x1="858" y1="470" x2="858" y2="430"/>
    <line x1="898" y1="470" x2="898" y2="400"/>
  </g>
  <line x1="938" y1="470" x2="938" y2="360" stroke="#d7000f" stroke-width="3"/>
  <line x1="840" y1="470" x2="956" y2="470" stroke="#1f1d1b" stroke-opacity="0.3" stroke-width="2"/>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — JOURNAL</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">BOI · INCENTIVES</text>
</svg>
