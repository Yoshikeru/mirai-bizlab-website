<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Two interlocking rings representing a joint shareholding incorporation">
  <defs>
    <linearGradient id="incPaper" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="incGlow" cx="56%" cy="36%" r="60%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.13"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
    <clipPath id="incLeft"><circle cx="512" cy="338" r="142"/></clipPath>
  </defs>
  <rect width="1200" height="675" fill="url(#incPaper)"/><rect width="1200" height="675" fill="url(#incGlow)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="80" cy="110" r="220" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- intersection lens (exact, via clip) -->
  <circle cx="688" cy="338" r="142" fill="#d7000f" fill-opacity="0.13" clip-path="url(#incLeft)"/>
  <!-- two interlocking rings -->
  <circle cx="512" cy="338" r="142" fill="none" stroke="#1f1d1b" stroke-width="2.5"/>
  <circle cx="512" cy="338" r="112" fill="none" stroke="#1f1d1b" stroke-opacity="0.22" stroke-width="1.5"/>
  <circle cx="688" cy="338" r="142" fill="none" stroke="#d7000f" stroke-width="2.5"/>
  <circle cx="688" cy="338" r="112" fill="none" stroke="#d7000f" stroke-opacity="0.3" stroke-width="1.5"/>
  <!-- shared center node -->
  <circle cx="600" cy="338" r="9" fill="#d7000f"/>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — JOURNAL</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">INCORPORATION</text>
</svg>
