<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A digital tax invoice with a verification check and upload arrow">
  <defs>
    <linearGradient id="eiPaper" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="eiGlow" cx="60%" cy="34%" r="60%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.13"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#eiPaper)"/><rect width="1200" height="675" fill="url(#eiGlow)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="90" cy="560" r="220" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- digital dot grid behind doc (right) -->
  <g fill="#1f1d1b" fill-opacity="0.12">
    <circle cx="720" cy="250" r="4"/><circle cx="752" cy="250" r="4"/><circle cx="784" cy="250" r="4"/><circle cx="816" cy="250" r="4"/>
    <circle cx="720" cy="282" r="4"/><circle cx="752" cy="282" r="4"/><circle cx="784" cy="282" r="4"/><circle cx="816" cy="282" r="4"/>
    <circle cx="720" cy="314" r="4"/><circle cx="752" cy="314" r="4"/><circle cx="784" cy="314" r="4"/><circle cx="816" cy="314" r="4"/>
  </g>

  <!-- document -->
  <g transform="translate(470 222)">
    <path d="M0 0 H170 L210 40 V232 H0 Z" fill="#ffffff" fill-opacity="0.55" stroke="#1f1d1b" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M170 0 V40 H210" fill="none" stroke="#1f1d1b" stroke-width="2.5" stroke-linejoin="round"/>
    <g stroke="#1f1d1b" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round">
      <line x1="34" y1="78" x2="150" y2="78"/><line x1="34" y1="112" x2="176" y2="112"/><line x1="34" y1="146" x2="176" y2="146"/><line x1="34" y1="180" x2="120" y2="180"/>
    </g>
  </g>
  <!-- verification check seal -->
  <g transform="translate(690 446)">
    <circle r="40" fill="#d7000f"/>
    <path d="M-18 2 L-5 16 L20 -14" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- upload arrow (submission) -->
  <g transform="translate(880 360)" stroke="#d7000f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="0" y1="60" x2="0" y2="-44"/>
    <path d="M-26 -18 L0 -46 L26 -18"/>
  </g>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — JOURNAL</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">E-INVOICE</text>
</svg>
