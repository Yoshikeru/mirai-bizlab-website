<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Project profit-and-loss bars with one loss bar under a magnifier">
  <defs>
    <linearGradient id="apP" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="apG" cx="62%" cy="32%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.12"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#apP)"/><rect width="1200" height="675" fill="url(#apG)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="1120" cy="560" r="220" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- zero baseline -->
  <line x1="360" y1="360" x2="860" y2="360" stroke="#1f1d1b" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- profit bars (up) -->
  <g fill="#1f1d1b" fill-opacity="0.85">
    <rect x="392" y="250" width="46" height="110" rx="3"/>
    <rect x="470" y="210" width="46" height="150" rx="3"/>
    <rect x="704" y="232" width="46" height="128" rx="3"/>
    <rect x="782" y="284" width="46" height="76" rx="3"/>
  </g>
  <!-- the loss project (below zero) -->
  <rect x="600" y="360" width="46" height="92" rx="3" fill="#d7000f"/>
  <!-- magnifier over the loss -->
  <g stroke="#d7000f" stroke-width="4" fill="none" stroke-linecap="round">
    <circle cx="623" cy="406" r="54"/>
    <line x1="662" y1="445" x2="700" y2="483"/>
  </g>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — CASE</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">AD AGENCY · PROJECT P/L</text>
</svg>
