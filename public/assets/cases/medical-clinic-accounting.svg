<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A medical cross card with a pulse line">
  <defs>
    <linearGradient id="mcaP" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="mcaG" cx="60%" cy="30%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.12"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#mcaP)"/><rect width="1200" height="675" fill="url(#mcaG)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="1120" cy="130" r="220" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- clinic card with cross -->
  <rect x="450" y="190" width="300" height="220" rx="26" fill="#ffffff" fill-opacity="0.5" stroke="#1f1d1b" stroke-width="3"/>
  <g stroke="#d7000f" stroke-width="16" stroke-linecap="round"><line x1="600" y1="250" x2="600" y2="350"/><line x1="550" y1="300" x2="650" y2="300"/></g>

  <!-- pulse / ECG line -->
  <polyline points="270,470 460,470 506,470 540,420 576,520 612,452 648,470 930,470" fill="none" stroke="#1f1d1b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="930" cy="470" r="7" fill="#d7000f"/>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — CASE</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">CLINIC · ACCOUNTING</text>
</svg>
