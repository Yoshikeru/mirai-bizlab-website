<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A registered company building with an approval seal and F&amp;B mark">
  <defs>
    <linearGradient id="ciP" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="ciG" cx="58%" cy="30%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.12"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#ciP)"/><rect width="1200" height="675" fill="url(#ciG)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="1120" cy="130" r="210" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- building -->
  <g fill="none" stroke="#1f1d1b" stroke-width="3" stroke-linejoin="round">
    <rect x="470" y="226" width="210" height="280"/>
    <line x1="470" y1="226" x2="575" y2="170"/><line x1="680" y1="226" x2="575" y2="170"/>
    <g stroke-opacity="0.45" stroke-width="2.5">
      <rect x="500" y="262" width="44" height="40"/><rect x="606" y="262" width="44" height="40"/>
      <rect x="500" y="330" width="44" height="40"/><rect x="606" y="330" width="44" height="40"/>
    </g>
    <rect x="548" y="430" width="54" height="76"/>
  </g>
  <line x1="430" y1="506" x2="770" y2="506" stroke="#1f1d1b" stroke-opacity="0.32" stroke-width="2.5" stroke-linecap="round"/>

  <!-- FNB mark (fork + knife) top-right of building -->
  <g stroke="#1f1d1b" stroke-width="3" stroke-linecap="round" fill="none" stroke-opacity="0.8">
    <line x1="726" y1="250" x2="726" y2="318"/><line x1="716" y1="250" x2="716" y2="276"/><line x1="736" y1="250" x2="736" y2="276"/>
    <line x1="766" y1="250" x2="766" y2="318"/><path d="M766 250 q-14 16 0 34"/>
  </g>

  <!-- approval seal -->
  <g transform="translate(648 452)"><circle r="46" fill="#d7000f"/><path d="M-20 2 L-6 18 L22 -16" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></g>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — CASE</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">INCORPORATION · F&amp;B</text>
</svg>
