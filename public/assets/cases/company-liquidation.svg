<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A company wound down in an orderly way, with a downward arrow and a cleared seal">
  <defs>
    <linearGradient id="clP" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="clG" cx="60%" cy="30%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.12"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#clP)"/><rect width="1200" height="675" fill="url(#clG)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="90" cy="560" r="210" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- building (winding down) -->
  <g fill="none" stroke="#1f1d1b" stroke-width="3" stroke-linejoin="round">
    <rect x="430" y="246" width="190" height="260"/>
    <g stroke-opacity="0.45" stroke-width="2.5">
      <rect x="458" y="280" width="40" height="36"/><rect x="552" y="280" width="40" height="36"/>
      <rect x="458" y="342" width="40" height="36"/><rect x="552" y="342" width="40" height="36"/>
      <rect x="458" y="404" width="40" height="36"/><rect x="552" y="404" width="40" height="36"/>
    </g>
  </g>
  <line x1="392" y1="506" x2="812" y2="506" stroke="#1f1d1b" stroke-opacity="0.32" stroke-width="2.5" stroke-linecap="round"/>

  <!-- orderly downward arrow -->
  <g stroke="#d7000f" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="700" y1="250" x2="700" y2="430"/>
    <path d="M668 398 L700 432 L732 398"/>
  </g>
  <!-- cleared seal -->
  <g transform="translate(760 300)"><circle r="40" fill="#d7000f"/><path d="M-17 2 L-5 15 L19 -13" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></g>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — CASE</text>
  <line x1="64" y1="600" x2="112" y2="600" stroke="#d7000f" stroke-width="3"/>
  <text x="124" y="606" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="19" letter-spacing="3">LIQUIDATION · CLOSURE</text>
</svg>
