<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="A cloud syncing into a dashboard with a rising trend">
  <defs>
    <linearGradient id="pcP" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#f6f3ee"/><stop offset="1" stop-color="#e8e2d8"/></linearGradient>
    <radialGradient id="pcG" cx="50%" cy="26%" r="62%"><stop offset="0" stop-color="#d7000f" stop-opacity="0.12"/><stop offset="1" stop-color="#d7000f" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#pcP)"/><rect width="1200" height="675" fill="url(#pcG)"/>
  <g stroke="#1f1d1b" stroke-opacity="0.045" stroke-width="1"><line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/></g>
  <g stroke="#1f1d1b" stroke-opacity="0.03" stroke-width="1"><line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/></g>
  <circle cx="110" cy="120" r="210" fill="none" stroke="#1f1d1b" stroke-opacity="0.05" stroke-width="2"/>

  <!-- cloud + sync dots -->
  <g transform="translate(600 138)" fill="none" stroke="#1f1d1b" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.5"><path d="M-104 38 a38 38 0 0 1 15 -74 a55 55 0 0 1 106 -9 a42 42 0 0 1 27 83 Z"/></g>
  <g fill="#1f1d1b" fill-opacity="0.22"><circle cx="600" cy="216" r="4"/><circle cx="600" cy="240" r="4"/></g>

  <!-- monitor / dashboard -->
  <rect x="416" y="266" width="368" height="226" rx="14" fill="#ffffff" fill-opacity="0.5" stroke="#1f1d1b" stroke-width="3"/>
  <line x1="540" y1="492" x2="660" y2="492" stroke="#1f1d1b" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="492" x2="600" y2="510" stroke="#1f1d1b" stroke-width="3"/>
  <!-- inside: bars + rising trend -->
  <line x1="446" y1="452" x2="754" y2="452" stroke="#1f1d1b" stroke-opacity="0.25" stroke-width="2"/>
  <g fill="#1f1d1b" fill-opacity="0.18"><rect x="460" y="406" width="34" height="46"/><rect x="512" y="382" width="34" height="70"/><rect x="564" y="404" width="34" height="48"/></g>
  <polyline points="452,420 512,398 572,406 636,356 712,318" fill="none" stroke="#d7000f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="712" cy="318" r="8" fill="#d7000f"/>

  <text x="64" y="78" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" fill="#8a8178" font-size="20" letter-spacing="3">MIRAI BIZLAB — CASE</text>
